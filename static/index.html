<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantic Layer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a1a;
      color: white;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    header span {
      color: #888;
      font-weight: 400;
      margin-left: 8px;
      font-size: 13px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
    }

    .message.user .bubble {
      background: #1a1a1a;
      color: white;
      padding: 10px 16px;
      border-radius: 18px 18px 4px 18px;
      float: right;
      max-width: 60%;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.user { text-align: right; }

    .message.assistant .bubble {
      background: white;
      border: 1px solid #e5e5e5;
      padding: 14px 16px;
      border-radius: 4px 18px 18px 18px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.error .bubble {
      background: #fff5f5;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 13px;
    }

    th {
      background: #f5f5f5;
      padding: 8px 12px;
      text-align: left;
      font-weight: 500;
      border-bottom: 2px solid #e5e5e5;
    }

    td {
      padding: 8px 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .thinking {
      color: #888;
      font-size: 13px;
      font-style: italic;
    }

    #input-area {
      border-top: 1px solid #e5e5e5;
      background: white;
      padding: 16px 24px;
    }

    #input-row {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }

    #question {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #e5e5e5;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }

    #question:focus { border-color: #1a1a1a; }

    button {
      background: #1a1a1a;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    button:disabled { background: #ccc; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #333; }

    .suggestions {
      max-width: 820px;
      margin: 0 auto 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .suggestion {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      color: #555;
    }

    .suggestion:hover { border-color: #1a1a1a; color: #1a1a1a; }

    .clearfix::after { content: ""; display: table; clear: both; }
  </style>
</head>
<body>

<header>
  Semantic Layer <span>TPC-H · llama3.2:3b · DuckDB</span>
</header>

<div id="chat">
  <div class="message assistant">
    <div class="bubble">
      Ask me anything about your data. I'll translate your question into a query and return the results.
    </div>
  </div>
</div>

<div id="input-area">
  <div class="suggestions">
    <div class="suggestion" onclick="ask('what is our total revenue by customer segment?')">total revenue by customer segment</div>
    <div class="suggestion" onclick="ask('how many orders by status?')">orders by status</div>
    <div class="suggestion" onclick="ask('show me revenue by order status')">revenue by order status</div>
  </div>
  <div id="input-row">
    <input id="question" type="text" placeholder="Ask a question about your data..." />
    <button id="send-btn" onclick="sendQuestion()">Ask</button>
  </div>
</div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("question");
  const btn = document.getElementById("send-btn");

  input.addEventListener("keydown", e => {
    if (e.key === "Enter") sendQuestion();
  });

  function ask(text) {
    input.value = text;
    sendQuestion();
  }

  function addMessage(role, content) {
    const div = document.createElement("div");
    div.className = `message ${role} clearfix`;
    div.innerHTML = `<div class="bubble">${content}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function renderTable(columns, data) {
    if (!data.length) return "<em>No results returned.</em>";
    const headers = columns.map(c => `<th>${c}</th>`).join("");
    const rows = data.map(row =>
      "<tr>" + columns.map(c => `<td>${row[c] ?? ""}</td>`).join("") + "</tr>"
    ).join("");
    return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
  }

  async function sendQuestion() {
    const question = input.value.trim();
    if (!question) return;

    input.value = "";
    btn.disabled = true;
    addMessage("user", question);
    const thinking = addMessage("assistant", '<span class="thinking">Thinking...</span>');

    try {
      const res = await fetch("/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
      });
      const data = await res.json();

      if (data.error) {
        thinking.className = "message error";
        thinking.querySelector(".bubble").textContent = data.error;
      } else {
        thinking.querySelector(".bubble").innerHTML = renderTable(data.columns, data.data);
      }
    } catch (e) {
      thinking.className = "message error";
      thinking.querySelector(".bubble").textContent = "Server error — is the API running?";
    }

    btn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
